<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avalon — Dev Panel</title>
<link rel="stylesheet" href="/static/css/common.css">
<style>
    body { overflow: auto; }
    #app { z-index: 1; position: relative; padding: 1rem; min-height: 100vh; }

    .dev-header {
        background: rgba(30,20,10,0.9);
        border: 1px solid var(--border-gold);
        border-radius: var(--radius-md);
        padding: 0.75rem 1.25rem;
        margin-bottom: 1rem;
        display: flex;
        flex-wrap: wrap;
        gap: 0.6rem;
        align-items: center;
    }
    .dev-title {
        font-family: var(--font-title);
        font-size: 1.1rem;
        color: var(--gold);
        margin-right: auto;
    }
    .dev-btn {
        padding: 0.4rem 0.9rem;
        border: 1px solid var(--border-gold);
        border-radius: var(--radius-sm);
        background: var(--bg-card);
        color: var(--gold-light);
        font-family: var(--font-heading);
        font-size: 0.75rem;
        letter-spacing: 0.06em;
        cursor: pointer;
        transition: all 0.15s;
        white-space: nowrap;
    }
    .dev-btn:hover:not(:disabled) { border-color: var(--gold); box-shadow: 0 0 6px rgba(201,168,76,0.2); }
    .dev-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .dev-btn.primary { background: linear-gradient(135deg, #2a2010, #1a1508); border-color: var(--gold); }
    .dev-btn.approve { border-color: var(--blue-glow); color: #7ec8ff; }
    .dev-btn.reject  { border-color: var(--red-glow); color: #ff8080; }
    .dev-btn.fail-btn { border-color: var(--red-glow); color: #ff8080; }
    .dev-sep { width: 1px; height: 22px; background: var(--border-gold); margin: 0 0.1rem; flex-shrink: 0; }

    select {
        background: var(--bg-card);
        border: 1px solid var(--border-gold);
        border-radius: var(--radius-sm);
        color: var(--text-primary);
        font-family: var(--font-heading);
        font-size: 0.8rem;
        padding: 0.3rem 0.4rem;
    }

    #game-code-display {
        font-family: var(--font-heading);
        font-size: 1rem;
        color: var(--gold);
        letter-spacing: 0.2em;
        padding: 0.2rem 0.6rem;
        border: 1px solid var(--border-gold);
        border-radius: var(--radius-pill);
    }

    .status-log {
        background: #050505;
        border: 1px solid var(--border-gold);
        border-radius: var(--radius-md);
        padding: 0.5rem 0.75rem;
        height: 110px;
        overflow-y: auto;
        font-family: monospace;
        font-size: 0.72rem;
        color: var(--text-secondary);
        margin-bottom: 0.75rem;
    }
    .log-entry.event { color: var(--gold-dim); }
    .log-entry.error { color: #ff6060; }

    /* Layout: TV full-width on top (capped height), phone cards scrollable row below */
    .host-frame-wrap {
        position: relative;
        width: 100%;
        max-height: 60vh;
        aspect-ratio: 16 / 9;
        background: #000;
        border: 1px solid var(--border-gold);
        border-radius: var(--radius-md);
        overflow: hidden;
        margin-bottom: 0.75rem;
    }
    #host-frame {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: none;
        display: block;
    }

    .players-scroll {
        display: flex;
        flex-direction: row;
        gap: 0.5rem;
        overflow-x: auto;
        padding-bottom: 0.5rem;
        align-items: flex-start;
    }
    .players-scroll::-webkit-scrollbar { height: 5px; }
    .players-scroll::-webkit-scrollbar-track { background: transparent; }
    .players-scroll::-webkit-scrollbar-thumb { background: var(--border-gold); border-radius: 3px; }

    /* Player card — phone aspect ratio */
    .vp-card {
        border: 1px solid var(--border-gold);
        border-radius: 18px;
        background: var(--bg-card);
        overflow: hidden;
        transition: border-color 0.3s;
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
        width: 140px;
        aspect-ratio: 9 / 19;
    }
    .vp-card.good { border-color: rgba(46,134,222,0.5); }
    .vp-card.evil { border-color: rgba(192,57,43,0.5); }
    .vp-card.leader { border-color: var(--gold) !important; }

    .vp-header {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 0.75rem;
        background: rgba(0,0,0,0.3);
        border-bottom: 1px solid var(--border-gold);
    }
    .vp-name {
        font-family: var(--font-heading);
        font-size: 0.85rem;
        color: var(--gold-light);
        flex: 1;
    }
    .vp-role-badge {
        font-family: var(--font-heading);
        font-size: 0.65rem;
        letter-spacing: 0.05em;
        padding: 0.15rem 0.4rem;
        border-radius: var(--radius-pill);
        background: rgba(0,0,0,0.4);
        color: var(--text-secondary);
    }
    .vp-role-badge.good { color: #7ec8ff; border: 1px solid rgba(46,134,222,0.3); }
    .vp-role-badge.evil { color: #ff8080; border: 1px solid rgba(192,57,43,0.3); }
    .vp-crown { color: var(--gold); font-size: 0.9rem; }

    .vp-body { padding: 0.6rem 0.75rem; display: flex; flex-direction: column; gap: 0.4rem; flex: 1; overflow-y: auto; }

    .vp-phase {
        font-family: var(--font-heading);
        font-size: 0.7rem;
        color: var(--text-dim);
        letter-spacing: 0.1em;
        text-transform: uppercase;
    }
    .vp-sees {
        font-family: var(--font-body);
        font-style: italic;
        font-size: 0.8rem;
        color: var(--text-secondary);
        line-height: 1.3;
    }

    .vp-actions { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.2rem; }
    .vp-btn {
        padding: 0.3rem 0.6rem;
        border-radius: var(--radius-sm);
        font-family: var(--font-heading);
        font-size: 0.65rem;
        letter-spacing: 0.06em;
        cursor: pointer;
        border: 1px solid;
        transition: all 0.15s;
        background: transparent;
    }
    .vp-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .vp-btn.approve { border-color: var(--blue-glow); color: #7ec8ff; }
    .vp-btn.reject  { border-color: var(--red-glow); color: #ff8080; }
    .vp-btn.success-c { border-color: var(--blue-glow); color: #7ec8ff; }
    .vp-btn.fail-c   { border-color: var(--red-glow); color: #ff8080; }
    .vp-btn.propose  { border-color: var(--gold); color: var(--gold-light); }
    .vp-btn.assassin { border-color: var(--red-glow); color: #ff8080; }
    .vp-btn:hover:not(:disabled) { filter: brightness(1.3); }

    .vp-team-select {
        width: 100%;
        font-family: var(--font-heading);
        font-size: 0.7rem;
        margin-top: 0.25rem;
    }
    .vp-team-select option { background: #1a1610; }

    .vp-voted, .vp-played { font-family: var(--font-heading); font-size: 0.7rem; color: var(--text-dim); }
    .vp-voted.done { color: var(--green-success); }
</style>
</head>
<body>
<div id="app">

    <div class="dev-header">
        <span class="dev-title">⚙ Dev Panel</span>

        <label style="font-family:var(--font-heading);font-size:0.75rem;color:var(--text-secondary)">Players:</label>
        <select id="player-count-select">
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8" selected>8</option>
            <option value="9">9</option>
            <option value="10">10</option>
        </select>

        <button class="dev-btn primary" id="btn-dev-create">▶ Create + Join</button>
        <span id="game-code-display">—</span>
        <button class="dev-btn primary" id="btn-dev-start" disabled>Start Game</button>

        <div class="dev-sep"></div>

        <button class="dev-btn" id="btn-auto-round" disabled title="Auto-propose + approve + success for one full mission">Auto Round</button>
        <button class="dev-btn approve" id="btn-auto-approve" disabled>Approve All</button>
        <button class="dev-btn reject"  id="btn-auto-reject" disabled>Reject All</button>
        <button class="dev-btn"         id="btn-auto-success" disabled>Success All</button>
        <button class="dev-btn fail-btn" id="btn-auto-fail" disabled>Evil Fail</button>

        <div class="dev-sep"></div>
        <button class="dev-btn" id="btn-dev-state">State</button>

        <div class="dev-sep"></div>
        <label style="font-family:var(--font-heading);font-size:0.7rem;color:var(--text-secondary)">🎵</label>
        <input type="range" id="dev-music-vol" min="0" max="100" step="5" value="55"
               style="width:80px;accent-color:var(--gold)" title="Music Volume">
        <button class="dev-btn" id="btn-dev-mute">Mute</button>
    </div>

    <div class="status-log" id="status-log"></div>

    <div class="host-frame-wrap">
        <iframe id="host-frame" src="about:blank"></iframe>
    </div>
    <div class="players-scroll" id="players-grid"></div>

</div>

<script src="/static/js/socket.io.min.js"></script>
<script src="/static/js/dev.js"></script>
</body>
</html>
